<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title> Reserva de taxi </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </head>

    <body>
        <div class="container-fluid px-0">

            <header class="bg-primary p-4 mb-3">
                <div class="container-fluid">
                    <div class="row align-items-center">
                        <div class="col-lg-3 d-none d-lg-block"></div>

                        <div class="col-12 col-lg-6 text-center">
                            <h1 class="text-white mb-0" data-section="header" data-value="title"> Taxis Aeropuertos Tenerife </h1>
                        </div>
                    
                        <div class="col-12 col-lg-3 text-center text-lg-end mt-3 mt-lg-0 position-relative z-3">
                            <select id="language-select" class="form-select form-select-sm bg-light border-0 shadow-sm" style="width: 110px; cursor: pointer;" aria-label="Selector de idioma">
                                <option value="es" selected> ESP </option>
                                <option value="en"> ENG </option>
                            </select>
                        </div>      
                    </div>

                    <nav class="nav justify-content-center mt-3" aria-label="Navegacion principal">
                        <a class="nav-link text-white" href="landpage.html" data-section="nav" data-value="home"> Inicio </a>
                        <a class="nav-link text-white" href="formulario_reserva.html" data-section="nav" data-value="booking"> Realizar Reserva </a>
                        <a class="nav-link text-white" href="formulario_contacto.html" data-section="nav" data-value="contact"> Contacto </a>
                        <a class="nav-link text-white" href="gestion_reserva.html" data-section="nav" data-value="manage"> Gestión Reserva </a>
                    </nav>
                </div>
            </header>

            <div class="container mt-5 w-50">

                <h2 class="mb-4" data-section="form" data-value="title"> Realiza tu reserva </h2>

                <form id="formReserva" aria-label="Formulario de reserva">

                    <div class="mb-3">
                        <label for="nombre" class="form-label" data-section="form" data-value="name_label"> Nombre completo </label>
                        <input type="text" id="nombre" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label" data-section="form" data-value="email_label"> Correo electrónico </label>
                        <input type="email" id="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="telefono" class="form-label" data-section="form" data-value="phone_label"> Teléfono de contacto </label>
                        <input type="tel" id="telefono" class="form-control" placeholder="Ej: 600123123" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="origen" class="form-label" data-section="form" data-value="origin_label"> Punto de recogida </label>
                            <select id="origen" class="form-select" required>
                                <option value="TFN" selected data-section="form" data-value="origin_tfn"> Aeropuerto Tenerife Norte </option>
                                <option value="TFS" data-section="form" data-value="origin_tfs"> Aeropuerto Tenerife Sur </option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="destino" class="form-label" data-section="form" data-value="dest_label"> Destino </label>
                            <select id="destino" class="form-select" required>
                                <option value="SCTF" selected data-section="form" data-value="dest_sctf"> Santa Cruz de Tenerife </option>
                                <option value="PC" data-section="form" data-value="dest_pc"> Puerto de la Cruz </option>
                                <option value="LLG" data-section="form" data-value="dest_llg"> La Laguna </option>
                                <option value="ADJ" data-section="form" data-value="dest_adj"> Adeje </option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="fecha" class="form-label" data-section="form" data-value="date_label"> Fecha del servicio </label>
                            <input type="date" id="fecha" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="hora" class="form-label" data-section="form" data-value="time_label"> Hora de recogida </label>
                            <input type="time" id="hora" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="pasajeros" class="form-label" data-section="form" data-value="passengers_label"> Número de pasajeros </label>
                        <input type="number" id="pasajeros" class="form-control" min="1" max="20" required>
                    </div>

                    <h5 data-section="form" data-value="vehicle_title"> Tipo de vehículo </h5>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="vehiculo" id="tradicional" required>
                        <label for="tradicional" class="form-check-label" data-section="form" data-value="veh_traditional"> Taxi Tradicional (hasta 4 plazas) </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="vehiculo" id="furgoneta">
                        <label for="furgoneta" class="form-check-label" data-section="form" data-value="veh_van"> Taxi Furgoneta (hasta 8 plazas) </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="vehiculo" id="lujo">
                        <label for="lujo" class="form-check-label" data-section="form" data-value="veh_luxury"> Taxi de Lujo </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="vehiculo" id="minibus">
                        <label for="minibus" class="form-check-label" data-section="form" data-value="veh_minibus"> Minibus </label>
                    </div>
                    
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="radio" name="vehiculo" id="bus">
                        <label for="bus" class="form-check-label" data-section="form" data-value="veh_bus"> Bus Grande </label>
                    </div>

                    <h5 data-section="form" data-value="extras_title"> Servicios extra </h5>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="sillaInfantil">
                        <label for="sillaInfantil" class="form-check-label" data-section="form" data-value="ext_baby"> Silla infantil (10€) </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="equipajeExtra">
                        <label for="equipajeExtra" class="form-check-label" data-section="form" data-value="ext_luggage"> Equipaje extra (15€) </label>
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="mascota">
                        <label for="mascota" class="form-check-label" data-section="form" data-value="ext_pet"> Transporte de mascota (15€) </label>
                    </div>

                    <div class="mb-3">
                        <label for="descuento" class="form-label" data-section="form" data-value="discount_label"> Código de descuento </label>
                        <input type="text" id="descuento" class="form-control">
                    </div>

                    <button type="submit" class="btn btn-primary" data-section="form" data-value="btn_submit"> Reservar </button>
                    <button type="reset" class="btn btn-secondary" data-section="form" data-value="btn_reset"> Limpiar </button>

                </form>
                
                <div id="resumen" class="alert" aria-live="polite"></div>
            </div>

            <footer class="text-white text-center mt-4 p-3 bg-primary">
                <p data-section="footer" data-value="company"> Empresa Taxi Tenerife </p>
                <p data-section="footer" data-value="phone"> Tel: 922 000 000 </p> 
                
                <div class="col-12 text-center">
                    <a href="#" class="text-white text-decoration-none me-3 fs-3" aria-label="Facebook">
                        <i class="bi bi-facebook" aria-hidden="true"></i>
                    </a>
                    <a href="#" class="text-white text-decoration-none me-3 fs-3" aria-label="Instagram">
                        <i class="bi bi-instagram" aria-hidden="true"></i>
                    </a>
                    <a href="#" class="text-white text-decoration-none fs-3" aria-label="Twitter">
                        <i class="bi bi-twitter-x" aria-hidden="true"></i> 
                    </a>
                </div>
            </footer>
        </div>

        <script src="traductor.js"></script>

        <script src="reserva.js"></script>
    </body>
</html>
