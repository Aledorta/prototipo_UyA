<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Contacto - Taxi Tenerife</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	</head>

	<body>
		<div class="container mt-5 mb-5" style="max-width: 800px;">
			<h2 class="mb-4">Formulario de contacto</h2>
			<p class="text-muted">Envíanos tu consulta y te responderemos lo antes posible.</p>

			<form id="formContacto">
				<div class="mb-3">
					<label for="nombre" class="form-label">Nombre completo</label>
					<input type="text" id="nombre" class="form-control" required>
				</div>

				<div class="mb-3">
					<label for="email" class="form-label">Correo electrónico</label>
					<input type="email" id="email" class="form-control" required>
				</div>

				<div class="mb-3">
					<label for="telefono" class="form-label">Teléfono (opcional)</label>
					<input type="tel" id="telefono" class="form-control" placeholder="Ej: 600123123">
				</div>

				<div class="mb-3">
					<label for="asunto" class="form-label">Asunto</label>
					<select id="asunto" class="form-select" required>
						<option value="" selected disabled>Selecciona una opción</option>
						<option>Información de tarifas</option>
						<option>Disponibilidad de vehículos</option>
						<option>Objetos perdidos</option>
						<option>Incidencia de servicio</option>
						<option>Otra consulta</option>
					</select>
				</div>

				<div class="mb-3">
					<label for="mensaje" class="form-label">Mensaje</label>
					<textarea id="mensaje" class="form-control" rows="5" placeholder="Escribe aquí tu consulta..." required></textarea>
				</div>

				<button type="submit" class="btn btn-primary">Enviar consulta</button>
				<!-- <button type="reset" class="btn btn-secondary">Limpiar</button> -->
			</form>
		</div>
	</body>
</html>
