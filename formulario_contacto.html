<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title> Contacto - Taxi Tenerife </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </head>

    <body>
        <div class="container-fluid px-0">

            <header class="bg-primary p-4 mb-3">
                <div class="container-fluid">
                    <div class="row align-items-center">
                        <div class="col-lg-3 d-none d-lg-block"></div>

                        <div class="col-12 col-lg-6 text-center">
                            <h1 class="text-white mb-0" data-section="header" data-value="title"> Taxis Aeropuertos Tenerife </h1>
                        </div>
                    
                        <div class="col-12 col-lg-3 text-center text-lg-end mt-3 mt-lg-0 position-relative z-3">
                            <select id="language-select" class="form-select form-select-sm bg-light border-0 shadow-sm" style="width: 110px; cursor: pointer;" aria-label="Selector de idioma">
                                <option value="es" selected> ESP </option>
                                <option value="en"> ENG </option>
                            </select>
                        </div>      
                    </div>

                    <nav class="nav justify-content-center mt-3" aria-label="Navegacion principal">
                        <a class="nav-link text-white" href="landpage.html" data-section="nav" data-value="home"> Inicio </a>
                        <a class="nav-link text-white" href="formulario_reserva.html" data-section="nav" data-value="booking"> Realizar Reserva </a>
                        <a class="nav-link text-white" href="formulario_contacto.html" data-section="nav" data-value="contact"> Contacto </a>
                        <a class="nav-link text-white" href="gestion_reserva.html" data-section="nav" data-value="manage"> Gestión Reserva </a>
                    </nav>
                </div>
            </header>

            <div class="container mt-5 mb-5 w-50">
                <h2 class="mb-4" data-section="contact" data-value="title"> Formulario de contacto </h2>
                <p class="text-muted" data-section="contact" data-value="subtitle"> Envíanos tu consulta y te responderemos lo antes posible. </p>

                <form id="formContacto" aria-label="Formulario de contacto">
                    <div class="mb-3">
                        <label for="nombre" class="form-label" data-section="contact" data-value="name_label"> Nombre completo </label>
                        <input type="text" id="nombre" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label" data-section="contact" data-value="email_label"> Correo electrónico </label>
                        <input type="email" id="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="telefono" class="form-label" data-section="contact" data-value="phone_label"> Teléfono (opcional) </label>
                        <input type="tel" id="telefono" class="form-control" placeholder="Ej: 600123123">
                    </div>

                    <div class="mb-3">
                        <label for="asunto" class="form-label" data-section="contact" data-value="subject_label"> Asunto </label>
                        <select id="asunto" class="form-select" required>
                            <option value="" selected disabled data-section="contact" data-value="subject_default"> Selecciona una opción </option>
                            <option data-section="contact" data-value="subject_1"> Información de tarifas </option>
                            <option data-section="contact" data-value="subject_2"> Disponibilidad de vehículos </option>
                            <option data-section="contact" data-value="subject_3"> Objetos perdidos </option>
                            <option data-section="contact" data-value="subject_4"> Incidencia de servicio </option>
                            <option data-section="contact" data-value="subject_5"> Otra consulta </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="mensaje" class="form-label" data-section="contact" data-value="message_label"> Mensaje </label>
                        <textarea id="mensaje" class="form-control" rows="5" placeholder="Escribe aquí tu consulta..." required data-section="contact" data-value="message_placeholder"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" data-section="contact" data-value="btn_submit"> Enviar consulta </button>
                    <button type="reset" class="btn btn-secondary" data-section="contact" data-value="btn_reset"> Limpiar </button>
                    
                </form>
            </div>

            <footer class="text-white text-center mt-4 p-3 bg-primary">
                <p data-section="footer" data-value="company"> Empresa Taxi Tenerife </p>
                <p data-section="footer" data-value="phone"> Tel: 922 000 000 </p> 
                
                <div class="col-12 text-center">
                    <a href="#" class="text-white text-decoration-none me-3 fs-3" aria-label="Facebook">
                        <i class="bi bi-facebook" aria-hidden="true"></i>
                    </a>
                    <a href="#" class="text-white text-decoration-none me-3 fs-3" aria-label="Instagram">
                        <i class="bi bi-instagram" aria-hidden="true"></i>
                    </a>
                    <a href="#" class="text-white text-decoration-none fs-3" aria-label="Twitter">
                        <i class="bi bi-twitter-x" aria-hidden="true"></i> 
                    </a>
                </div>
            </footer>
        </div>

        <script src="traductor.js"></script>
    </body>
</html>
